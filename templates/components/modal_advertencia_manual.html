<div id="modal-manual" class="pt-modal-backdrop">
  <div class="pt-modal">
    <div class="pt-modal-header pt-tone-danger">
      <i class="ri-alert-line"></i>
      <span class="pt-modal-title">Advertência manual</span>
      <button class="pt-modal-close" onclick="closeModal('modal-manual')">&times;</button>
    </div>
    <form action="/advertencias/manual" method="POST">
      <div class="pt-modal-body">
        <div class="pt-field">
          <label class="pt-label">Padrinho</label>
          <select name="padrinho_id" required class="pt-select">
            <option value="">Selecione...</option>
            {% for p in padrinhos %}
              <option value="{{ p['id'] }}">{{ p["nome"] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="pt-field">
          <label class="pt-label">Tipo de advertência</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--pt-border);border-radius:8px;transition:background 0.15s;" id="label-amarelo">
              <input type="radio" name="tipo" value="amarelo" required onchange="atualizarTipoAdv()"
                     style="accent-color:#f59e0b;width:16px;height:16px;" />
              <span>
                <span style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--pt-ink);">
                  <i class="ri-error-warning-line" style="color:#f59e0b;"></i> Advertência
                </span>
                <span style="font-size:11px;color:var(--pt-muted);">Atraso em tema, comportamento leve</span>
              </span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--pt-border);border-radius:8px;transition:background 0.15s;" id="label-vermelho">
              <input type="radio" name="tipo" value="vermelho" onchange="atualizarTipoAdv()"
                     style="accent-color:#dc2626;width:16px;height:16px;" />
              <span>
                <span style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--pt-ink);">
                  <i class="ri-close-circle-line" style="color:#dc2626;"></i> Advertência Grave
                </span>
                <span style="font-size:11px;color:var(--pt-muted);">Não entrega de tema, comportamento grave</span>
              </span>
            </label>
          </div>
        </div>
        <div class="pt-field">
          <label class="pt-label">Motivo</label>
          <textarea name="motivo" rows="3" required
                    placeholder="Descreva o motivo da advertência..."
                    class="pt-textarea"></textarea>
        </div>
        <div id="adv-aviso-grave" class="pt-modal-warning" style="display:none;">
          <i class="ri-alert-line"></i>
          <p>Esta advertência emite um cartão vermelho automaticamente — o padrinho ficará inapto para o ACG e será reportado ao professor coordenador.</p>
        </div>
        <div id="adv-dica-grave" style="display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 13px;font-size:12px;color:#92400e;">
          💡 Use apenas para casos graves: não entrega de tema ou incidente que exija reporte ao Professor Coordenador.
        </div>
        <div class="pt-modal-actions">
          <button type="button" class="pt-btn pt-btn-ghost" onclick="closeModal('modal-manual')">Cancelar</button>
          <button type="submit" class="pt-btn pt-btn-danger">
            <i class="ri-send-plane-line"></i> Emitir advertência
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
<script>
function atualizarTipoAdv() {
  var grave = document.querySelector('input[name="tipo"][value="vermelho"]').checked;
  document.getElementById('adv-aviso-grave').style.display = grave ? '' : 'none';
  document.getElementById('adv-dica-grave').style.display  = grave ? '' : 'none';
}
</script>
