<div id="modal-manual" class="pt-modal-backdrop">
  <div class="pt-modal">
    <div class="pt-modal-header pt-tone-danger">
      <i class="ri-alert-line"></i>
      <span class="pt-modal-title">Advertência manual</span>
      <button class="pt-modal-close" onclick="closeModal('modal-manual')">&times;</button>
    </div>
    <form action="/advertencias/manual" method="POST">
      <div class="pt-modal-body">
        <div class="pt-field">
          <label class="pt-label">Padrinho</label>
          <select name="padrinho_id" required class="pt-select">
            <option value="">Selecione...</option>
            {% for p in padrinhos %}
              <option value="{{ p['id'] }}">{{ p["nome"] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="pt-field">
          <label class="pt-label">Motivo</label>
          <textarea name="motivo" rows="3" required
                    placeholder="Descreva o comportamento inadequado..."
                    class="pt-textarea"></textarea>
        </div>
        <div class="pt-modal-warning">
          <i class="ri-alert-line"></i>
          <p>Esta advertência emite um cartão vermelho automaticamente — o padrinho ficará inapto para o ACG e será reportado ao professor coordenador.</p>
        </div>
        <div class="pt-modal-actions">
          <button type="button" class="pt-btn pt-btn-ghost" onclick="closeModal('modal-manual')">Cancelar</button>
          <button type="submit" class="pt-btn pt-btn-danger">
            <i class="ri-send-plane-line"></i> Emitir advertência
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
