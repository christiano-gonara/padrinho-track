<div id="modal-manual" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
    <div class="bg-gradient-to-r from-red-500 to-rose-600 px-6 py-4 flex items-center justify-between">
      <h2 class="text-base font-semibold text-white flex items-center gap-2">
        <i class="ri-alert-line"></i> Advertência manual
      </h2>
      <button onclick="document.getElementById('modal-manual').classList.add('hidden')"
              class="text-white/70 hover:text-white text-xl leading-none transition">&times;</button>
    </div>
    <form action="/advertencias/manual" method="POST" class="flex flex-col gap-4 p-6">
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Padrinho</label>
        <select name="padrinho_id" required
                class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 transition">
          <option value="">Selecione...</option>
          {% for p in padrinhos %}
            <option value="{{ p['id'] }}">{{ p["nome"] }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Motivo</label>
        <textarea name="motivo" rows="3" required
                  placeholder="Descreva o comportamento inadequado..."
                  class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 transition resize-none"></textarea>
      </div>
      <div class="flex items-start gap-3 bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-900 rounded-xl px-4 py-3 text-xs text-red-700 dark:text-red-300">
        <i class="ri-alert-line text-red-500 mt-0.5 shrink-0"></i>
        Esta advertência emite um cartão vermelho automaticamente — o padrinho ficará inapto para o ACG e será reportado ao professor coordenador.
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button"
                onclick="document.getElementById('modal-manual').classList.add('hidden')"
                class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-4 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-gray-800 transition">
          Cancelar
        </button>
        <button type="submit"
                class="flex items-center gap-2 bg-gradient-to-r from-red-500 to-rose-600 text-white text-sm px-5 py-2.5 rounded-xl hover:from-red-600 hover:to-rose-700 transition font-medium shadow-sm">
          <i class="ri-send-plane-line"></i> Emitir advertência
        </button>
      </div>
    </form>
  </div>
</div>
