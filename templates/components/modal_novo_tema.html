<div id="modal-novo" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-500 to-violet-600 px-6 py-4 flex items-center justify-between">
      <h2 class="text-base font-semibold text-white flex items-center gap-2">
        <i class="ri-book-open-line"></i> Novo tema
      </h2>
      <button onclick="document.getElementById('modal-novo').classList.add('hidden')"
              class="text-white/70 hover:text-white text-xl leading-none transition">&times;</button>
    </div>
    <form action="/temas/novo" method="POST" class="flex flex-col gap-4 p-6">
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Título do tema</label>
        <input type="text" name="titulo" required
               class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Data de aviso</label>
          <input type="date" name="data_aviso"
                 class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Prazo de entrega</label>
          <input type="date" name="data_limite" required
                 class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Responsáveis</label>
        <select name="padrinho_ids" multiple required
                class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition h-36">
          {% for p in padrinhos %}
            <option value="{{ p['id'] }}">{{ p["nome"] }}</option>
          {% endfor %}
        </select>
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1.5 flex items-center gap-1">
          <i class="ri-information-line"></i> Segura Ctrl para selecionar mais de um
        </p>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button"
                onclick="document.getElementById('modal-novo').classList.add('hidden')"
                class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-4 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-gray-800 transition">
          Cancelar
        </button>
        <button type="submit"
                class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 text-white text-sm px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-violet-700 transition font-medium shadow-sm">
          <i class="ri-save-line"></i> Registrar
        </button>
      </div>
    </form>
  </div>
</div>
