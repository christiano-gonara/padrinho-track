<div id="modal-nova" class="pt-modal-backdrop">
  <div class="pt-modal">
    <div class="pt-modal-header pt-tone-violet">
      <i class="ri-calendar-line"></i>
      <span class="pt-modal-title">Nova reunião</span>
      <button class="pt-modal-close" onclick="closeModal('modal-nova')">&times;</button>
    </div>
    <form action="/reunioes/nova" method="POST">
      <div class="pt-modal-body">
        <div class="pt-field">
          <label class="pt-label">Data</label>
          <input type="date" name="data" required class="pt-input" />
        </div>
        <div class="pt-field">
          <label class="pt-label">Tema <span class="pt-label-optional">(opcional)</span></label>
          <input type="text" name="tema" class="pt-input" />
        </div>
        <div class="pt-field">
          <label class="pt-label">Descrição <span class="pt-label-optional">(opcional)</span></label>
          <textarea name="descricao" class="pt-textarea"></textarea>
        </div>
        <div class="pt-modal-actions">
          <button type="button" class="pt-btn pt-btn-ghost" onclick="closeModal('modal-nova')">Cancelar</button>
          <button type="submit" class="pt-btn pt-btn-primary">
            <i class="ri-save-line"></i> Criar reunião
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
