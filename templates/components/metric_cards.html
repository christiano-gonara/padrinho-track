<div class="pt-grid-4 mb-8">

  <div class="pt-metric-card pt-metric-green">
    <div class="pt-metric-card-top">
      <div class="pt-metric-icon"><i class="ri-checkbox-circle-line"></i></div>
      <span class="pt-metric-label">Aptos</span>
    </div>
    <div class="pt-metric-body">
      <span class="pt-metric-value">{{ aptos | length }}</span>
    </div>
  </div>

  <div class="pt-metric-card pt-metric-amber">
    <div class="pt-metric-card-top">
      <div class="pt-metric-icon"><i class="ri-error-warning-line"></i></div>
      <span class="pt-metric-label">Em alerta</span>
    </div>
    <div class="pt-metric-body">
      <span class="pt-metric-value">{{ alertas | length }}</span>
    </div>
  </div>

  <div class="pt-metric-card pt-metric-orange">
    <div class="pt-metric-card-top">
      <div class="pt-metric-icon"><i class="ri-alert-line"></i></div>
      <span class="pt-metric-label">Reprovados</span>
    </div>
    <div class="pt-metric-body">
      <span class="pt-metric-value">{{ inapto_am | length }}</span>
    </div>
  </div>

  <div class="pt-metric-card pt-metric-red">
    <div class="pt-metric-card-top">
      <div class="pt-metric-icon"><i class="ri-close-circle-line"></i></div>
      <span class="pt-metric-label">Reportados</span>
    </div>
    <div class="pt-metric-body">
      <span class="pt-metric-value">{{ inapto_verm | length }}</span>
    </div>
  </div>

</div>
