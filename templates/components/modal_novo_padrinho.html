<div id="modal-novo" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-500 to-violet-600 px-6 py-4 flex items-center justify-between">
      <h2 class="text-base font-semibold text-white flex items-center gap-2">
        <i class="ri-user-add-line"></i> Novo padrinho
      </h2>
      <button onclick="document.getElementById('modal-novo').classList.add('hidden')"
              class="text-white/70 hover:text-white text-xl leading-none transition">&times;</button>
    </div>
    <form action="/padrinhos/novo" method="POST" class="flex flex-col gap-4 p-6">
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Nome completo</label>
        <input type="text" name="nome" required
               class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Matrícula</label>
          <input type="text" name="matricula" required
                 class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Turno</label>
          <select name="turno"
                  class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
            <option value="">Selecione...</option>
            <option value="Manhã">Manhã</option>
            <option value="Noite">Noite</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Email <span class="text-gray-400 font-normal">(opcional)</span></label>
        <input type="email" name="email"
               class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">Telefone <span class="text-gray-400 font-normal">(opcional)</span></label>
        <input type="text" name="telefone"
               class="w-full border border-slate-300 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-100 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button"
                onclick="document.getElementById('modal-novo').classList.add('hidden')"
                class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-4 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-gray-800 transition">
          Cancelar
        </button>
        <button type="submit"
                class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-600 text-white text-sm px-5 py-2.5 rounded-xl hover:from-indigo-600 hover:to-violet-700 transition font-medium shadow-sm">
          <i class="ri-save-line"></i> Cadastrar
        </button>
      </div>
    </form>
  </div>
</div>
