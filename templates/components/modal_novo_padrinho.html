<div id="modal-novo" class="pt-modal-backdrop">
  <div class="pt-modal">
    <div class="pt-modal-header pt-tone-violet">
      <i class="ri-user-add-line"></i>
      <span class="pt-modal-title">Novo padrinho</span>
      <button class="pt-modal-close" onclick="closeModal('modal-novo')">&times;</button>
    </div>
    <form action="/padrinhos/novo" method="POST">
      <div class="pt-modal-body">
        <div class="pt-field">
          <label class="pt-label">Nome completo</label>
          <input type="text" name="nome" required class="pt-input" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="pt-field">
            <label class="pt-label">Matrícula</label>
            <input type="text" name="matricula" required class="pt-input" />
          </div>
          <div class="pt-field">
            <label class="pt-label">Turno</label>
            <select name="turno" class="pt-select">
              <option value="">Selecione...</option>
              <option value="Manhã">Manhã</option>
              <option value="Noite">Noite</option>
            </select>
          </div>
        </div>
        <div class="pt-field">
          <label class="pt-label">Email <span class="pt-label-optional">(opcional)</span></label>
          <input type="email" name="email" class="pt-input" />
        </div>
        <div class="pt-field">
          <label class="pt-label">Telefone <span class="pt-label-optional">(opcional)</span></label>
          <input type="text" name="telefone" class="pt-input" />
        </div>
        <div class="pt-modal-actions">
          <button type="button" class="pt-btn pt-btn-ghost" onclick="closeModal('modal-novo')">Cancelar</button>
          <button type="submit" class="pt-btn pt-btn-primary">
            <i class="ri-save-line"></i> Cadastrar
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
